<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>三页面切换</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #e8e8e8;
            font-family: sans-serif;
        }

        .content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #d0d0d0;
            overflow: hidden;
            padding: 20px;
        }

        .page {
            display: none;
            width: 100%;
            height: 100%;
            align-items: center;
            justify-content: center;
        }
        .page.active {
            display: flex;
        }

        .page img, .page video {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .bottom-nav {
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            padding: 20px 10px 30px;
            background: transparent;
            flex-shrink: 0;
        }
        .nav-btn {
            border: none;
            background: transparent;
            cursor: pointer;
            padding: 0;
            transition: transform 0.2s;
        }
        .nav-btn:active { transform: scale(0.92); }
        .glass-icon {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        .nav-btn.active .glass-icon {
            background: rgba(255, 255, 255, 0.6);
            border-color: rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.8);
        }
        .glass-icon svg {
            width: 32px;
            height: 32px;
            fill: none;
            stroke: #444;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .nav-btn.active .glass-icon svg {
            stroke: #000;
        }
    </style>
</head>
<body>

    <div class="content">
        <!-- 页面1：显示图片（相对路径，图片与HTML同级） -->
        <div id="pageKernel" class="page active">
            <img src="bt账号扫码器_icon.png" alt="扫码器">
        </div>
        <div id="pageAccount" class="page">
            <!-- 页面2预留 -->
        </div>
        <div id="pagePlane" class="page">
            <!-- 页面3预留 -->
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-btn active" data-target="pageKernel">
            <div class="glass-icon">
                <svg viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="3"/>
                    <ellipse cx="12" cy="12" rx="8" ry="3" transform="rotate(30 12 12)"/>
                    <ellipse cx="12" cy="12" rx="8" ry="3" transform="rotate(90 12 12)"/>
                    <ellipse cx="12" cy="12" rx="8" ry="3" transform="rotate(150 12 12)"/>
                </svg>
            </div>
        </button>
        <button class="nav-btn" data-target="pageAccount">
            <div class="glass-icon">
                <svg viewBox="0 0 24 24">
                    <circle cx="12" cy="10" r="4"/>
                    <path d="M5 20v-2a4 4 0 014-4h6a4 4 0 014 4v2"/>
                    <path d="M18 9l2 2 4-4"/>
                </svg>
            </div>
        </button>
        <button class="nav-btn" data-target="pagePlane">
            <div class="glass-icon">
                <svg viewBox="0 0 24 24">
                    <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                </svg>
            </div>
        </button>
    </div>

    <script>
        const btns = document.querySelectorAll('.nav-btn');
        const pages = {
            pageKernel: document.getElementById('pageKernel'),
            pageAccount: document.getElementById('pageAccount'),
            pagePlane: document.getElementById('pagePlane')
        };

        btns.forEach(btn => {
            btn.addEventListener('click', function() {
                btns.forEach(b => b.classList.remove('active'));
                this.classList.add('active');

                const targetId = this.getAttribute('data-target');
                Object.keys(pages).forEach(key => {
                    pages[key].classList.remove('active');
                });
                if (pages[targetId]) {
                    pages[targetId].classList.add('active');
                }
            });
        });
    </script>
</body>
</html>
